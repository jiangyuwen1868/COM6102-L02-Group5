<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 10px; border: 1px solid #ddd; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>API 测试</h1>
    
    <div class="test-section">
        <h2>测试登录</h2>
        <button onclick="testLogin()">测试登录</button>
        <div class="result" id="loginResult"></div>
    </div>
    
    <div class="test-section">
        <h2>测试活动列表</h2>
        <button onclick="testActivities()">测试活动列表</button>
        <div class="result" id="activitiesResult"></div>
    </div>
    
    <div class="test-section">
        <h2>测试库存列表</h2>
        <button onclick="testStock()">测试库存列表</button>
        <div class="result" id="stockResult"></div>
    </div>
    
    <script>
        const API_BASE = window.location.protocol + '//' + window.location.host + '/api';
        let token = '';
        
        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'Admin123!@#',
                        captchaId: 'test',
                        captchaCode: '1234'
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                if (data.code === 0 && data.token) {
                    token = data.token;
                    localStorage.setItem('auth_token', token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre>错误: ${error.message}</pre>`;
            }
        }
        
        async function testActivities() {
            const resultDiv = document.getElementById('activitiesResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const response = await fetch(`${API_BASE}/activities`, {
                    headers: {
                        'Authorization': token
                    }
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre>错误: ${error.message}</pre>`;
            }
        }
        
        async function testStock() {
            const resultDiv = document.getElementById('stockResult');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const response = await fetch(`${API_BASE}/stock/products`, {
                    headers: {
                        'Authorization': token
                    }
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre>错误: ${error.message}</pre>`;
            }
        }
        
        // 页面加载时检查是否有 token
        window.onload = function() {
            token = localStorage.getItem('auth_token') || '';
        };
    </script>
</body>
</html>
