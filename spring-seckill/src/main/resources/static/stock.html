<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存管理 - 秒杀系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 28px;
            margin-right: 10px;
        }
        
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .login-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 页面内容 */
        .page-content {
            padding: 20px 0;
        }

        .page-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .btn-sync-all {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }

        .btn-sync-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            color: #333;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(254, 202, 87, 0.3);
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stock-table thead {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }

        .stock-table th {
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
        }

        .stock-table tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease;
        }

        .stock-table tbody tr:hover {
            background: #f8f9fa;
        }

        .stock-table td {
            padding: 15px;
            font-size: 14px;
        }

        .stock-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stock-db {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .stock-redis {
            font-size: 12px;
            color: #666;
        }

        .stock-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-normal {
            background: #d4edda;
            color: #155724;
        }

        .status-low {
            background: #fff3cd;
            color: #856404;
        }

        .status-critical {
            background: #f8d7da;
            color: #721c24;
        }

        .status-synced {
            background: #d4edda;
            color: #155724;
        }

        .status-unsynced {
            background: #f8d7da;
            color: #721c24;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-btn-small {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-sync-single {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-sync-single:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
        }

        .btn-preload {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }

        .btn-preload:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.3);
        }

        .loading {
            text-align: center;
            padding: 60px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #333;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ff6b6b;
        }

        .modal-header h2 {
            color: #ff6b6b;
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            
            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .stock-table {
                font-size: 12px;
            }
            
            .stock-table th,
            .stock-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span>闪电秒杀</span>
            </div>
            <nav class="nav-menu" id="navMenu" style="display: none;">
                <a href="index.html" class="nav-link">首页</a>
                <a href="orders.html" class="nav-link">订单管理</a>
                <a href="activities.html" class="nav-link">活动管理</a>
                <a href="stock.html" class="nav-link active">库存管理</a>
                <a href="product-management.html" class="nav-link">商品管理</a>
                <a href="dashboard.html" class="nav-link">数据监控</a>
                <a href="user-center.html" class="nav-link">用户中心</a>
            </nav>
            <div class="user-section">
                <div class="user-info" id="userInfo" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
                <div class="login-notice" id="loginNotice">
                    <a href="login.html" class="login-link">请登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container page-content">
        <h1 class="page-title">📦 库存管理</h1>

        <div class="stats-cards">
            <div class="stat-card">
                <h3>商品总数</h3>
                <div class="value" id="totalProducts">0</div>
            </div>
            <div class="stat-card">
                <h3>库存充足</h3>
                <div class="value" id="normalStock">0</div>
            </div>
            <div class="stat-card">
                <h3>库存紧张</h3>
                <div class="value" id="lowStock">0</div>
            </div>
            <div class="stat-card">
                <h3>库存不足</h3>
                <div class="value" id="criticalStock">0</div>
            </div>
            <div class="stat-card">
                <h3>已同步</h3>
                <div class="value" id="syncedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>未同步</h3>
                <div class="value" id="unsyncedCount">0</div>
            </div>
        </div>

        <div class="action-bar">
            <button class="action-btn btn-sync-all" onclick="syncAllStock()">🔄 同步所有库存</button>
            <button class="action-btn btn-refresh" onclick="loadStockData()">🔄 刷新数据</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            加载中
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <h3>暂无商品</h3>
            <p>系统中还没有任何商品</p>
        </div>

        <table class="stock-table" id="stockTable" style="display: none;">
            <thead>
                <tr>
                    <th>商品ID</th>
                    <th>商品名称</th>
                    <th>价格</th>
                    <th>库存信息</th>
                    <th>库存状态</th>
                    <th>同步状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="stockBody">
            </tbody>
        </table>
    </div>

    <div class="modal" id="preloadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>预热库存</h2>
                <button class="close-btn" onclick="closePreloadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>商品名称：</label>
                    <input type="text" id="preloadProductName" readonly>
                </div>
                <div class="form-group">
                    <label>当前库存：</label>
                    <input type="text" id="preloadCurrentStock" readonly>
                </div>
                <div class="form-group">
                    <label>预热数量：</label>
                    <input type="number" id="preloadAmount" min="1" max="1000" value="100">
                </div>
            </div>
            <div class="modal-footer">
                <button class="action-btn btn-cancel" onclick="closePreloadModal()">取消</button>
                <button class="action-btn btn-confirm" onclick="confirmPreload()">确认预热</button>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script>
        const API_BASE = window.location.protocol + '//' + window.location.host + '/api';
        let currentPreloadProductId = null;

        function getToken() {
            const token = localStorage.getItem('auth_token');
            console.log('从localStorage获取token:', token);
            console.log('localStorage中的所有键:', Object.keys(localStorage));
            return token;
        }

        // 初始化用户认证状态
        function initAuth() {
            const token = getToken();
            if (token) {
                // 尝试验证token的有效性
                fetch(`${API_BASE}/user/info`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0 && data.user) {
                        document.getElementById('userInfo').style.display = 'flex';
                        document.getElementById('loginNotice').style.display = 'none';
                        document.getElementById('navMenu').style.display = 'flex';
                        document.getElementById('userName').textContent = data.user.nickname || data.user.username || '用户';
                    } else {
                        // token无效，清除并跳转到登录页面
                        localStorage.removeItem('auth_token');
                        document.getElementById('userInfo').style.display = 'none';
                        document.getElementById('loginNotice').style.display = 'block';
                        document.getElementById('navMenu').style.display = 'none';
                        // 存储当前页面URL，以便登录后返回
                        localStorage.setItem('previous_url', window.location.href);
                        // 未授权时重定向到登录页面
                        window.location.href = 'login.html';
                    }
                })
                .catch(error => {
                    console.error('验证token失败:', error);
                    // 出错时清除token并跳转到登录页面
                    localStorage.removeItem('auth_token');
                    document.getElementById('userInfo').style.display = 'none';
                    document.getElementById('loginNotice').style.display = 'block';
                    document.getElementById('navMenu').style.display = 'none';
                    // 存储当前页面URL，以便登录后返回
                    localStorage.setItem('previous_url', window.location.href);
                    // 出错时重定向到登录页面
                    window.location.href = 'login.html';
                });
            } else {
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('loginNotice').style.display = 'block';
                document.getElementById('navMenu').style.display = 'none';
                // 存储当前页面URL，以便登录后返回
                localStorage.setItem('previous_url', window.location.href);
                // 未登录时重定向到登录页面
                window.location.href = 'login.html';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('auth_token');
            initAuth();
        }

        function formatAmount(amount) {
            return '¥' + parseFloat(amount).toFixed(2);
        }

        function getStockStatus(stock) {
            if (stock <= 0) {
                return { class: 'status-critical', text: '缺货' };
            } else if (stock < 10) {
                return { class: 'status-critical', text: '不足' };
            } else if (stock < 50) {
                return { class: 'status-low', text: '紧张' };
            } else {
                return { class: 'status-normal', text: '充足' };
            }
        }

        function getSyncStatus(dbStock, redisStock) {
            if (dbStock === redisStock) {
                return { class: 'status-synced', text: '已同步' };
            } else {
                return { class: 'status-unsynced', text: '未同步' };
            }
        }

        async function loadStockData() {
            const token = getToken();
            console.log('获取到的token:', token);
            if (!token) {
                console.log('token为空，重定向到登录页面');
                window.location.href = 'login.html';
                return;
            }

            showLoading(true);
            try {
                console.log('发送请求到:', `${API_BASE}/stock/products`);
                console.log('请求头:', { 'Authorization': token });
                const response = await fetch(`${API_BASE}/stock/products`, {
                    headers: {
                        'Authorization': token
                    }
                });
                
                console.log('响应状态:', response.status);
                console.log('响应状态文本:', response.statusText);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('获取商品信息失败:', response.status, response.statusText, errorText);
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权，重定向到登录页面');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`获取商品信息失败: ${response.status} ${response.statusText} - ${errorText}`);
                }
                
                const products = await response.json();
                console.log('获取到的商品信息:', products);
                displayStockData(products);
                showLoading(false);
            } catch (error) {
                console.error('加载库存数据失败:', error);
                showLoading(false);
                showError('加载库存数据失败: ' + error.message);
            }
        }

        async function displayStockData(products) {
            const tbody = document.getElementById('stockBody');
            const table = document.getElementById('stockTable');
            const emptyState = document.getElementById('emptyState');
            
            if (!products || products.length === 0) {
                tbody.innerHTML = '';
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            table.style.display = 'table';
            emptyState.style.display = 'none';
            
            tbody.innerHTML = await Promise.all(products.map(async product => {
                const stockStatus = getStockStatus(product.dbStock);
                const redisStock = product.redisStock || 0;
                const syncStatus = getSyncStatus(product.dbStock, redisStock);
                
                return `
                    <tr>
                        <td style="font-family: monospace; font-weight: bold;">${product.productId}</td>
                        <td style="font-weight: bold;">${product.productName}</td>
                        <td style="color: #667eea; font-weight: bold;">${formatAmount(product.price || 0)}</td>
                        <td>
                            <div class="stock-info">
                                <span class="stock-db">数据库: ${product.dbStock}</span>
                                <span class="stock-redis">Redis: ${redisStock}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.min(product.dbStock / Math.max(product.dbStock, 1) * 100, 100)}%"></div>
                            </div>
                        </td>
                        <td><span class="stock-status ${stockStatus.class}">${stockStatus.text}</span></td>
                        <td><span class="stock-status ${syncStatus.class}">${syncStatus.text}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn-small btn-sync-single" onclick="syncSingleStock(${product.productId})")">同步</button>
                                <button class="action-btn-small btn-preload" onclick="openPreloadModal(${product.productId}, '${product.productName}', ${product.dbStock})")">预热</button>
                            </div>
                        </td>
                    </tr>
                `;
            })).then(html => html.join(''));
            
            updateStats(products);
        }

        async function getRedisStock(productId) {
            try {
                const token = getToken();
                const response = await fetch(`${API_BASE}/stock/redis/${productId}`, {
                    headers: {
                        'Authorization': token
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return data.stock || 0;
                }
                return 0;
            } catch (error) {
                console.error('获取Redis库存失败:', error);
                return 0;
            }
        }

        function updateStats(products) {
            const stats = {
                totalProducts: products.length,
                normalStock: 0,
                lowStock: 0,
                criticalStock: 0,
                syncedCount: 0,
                unsyncedCount: 0
            };
            
            products.forEach(product => {
                if (product.dbStock >= 50) {
                    stats.normalStock++;
                } else if (product.dbStock >= 10) {
                    stats.lowStock++;
                } else {
                    stats.criticalStock++;
                }
                
                if (product.dbStock === product.redisStock) {
                    stats.syncedCount++;
                } else {
                    stats.unsyncedCount++;
                }
            });
            
            document.getElementById('totalProducts').textContent = stats.totalProducts;
            document.getElementById('normalStock').textContent = stats.normalStock;
            document.getElementById('lowStock').textContent = stats.lowStock;
            document.getElementById('criticalStock').textContent = stats.criticalStock;
            document.getElementById('syncedCount').textContent = stats.syncedCount;
            document.getElementById('unsyncedCount').textContent = stats.unsyncedCount;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        async function syncSingleStock(productId) {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/stock/sync/${productId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('库存同步成功');
                    loadStockData();
                } else {
                    showError(result.message || '库存同步失败');
                }
            } catch (error) {
                console.error('库存同步失败:', error);
                showError('库存同步失败，请稍后重试');
            }
        }

        async function syncAllStock() {
            showConfirm('确定要同步所有商品的库存吗？', async function() {
                const token = getToken();
                try {
                    const response = await fetch(`${API_BASE}/stock/sync-all`, {
                        method: 'POST',
                        headers: {
                            'Authorization': token
                        }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showSuccess('所有库存同步成功');
                        loadStockData();
                    } else {
                        showError(result.message || '库存同步失败');
                    }
                } catch (error) {
                    console.error('库存同步失败:', error);
                    showError('库存同步失败，请稍后重试');
                }
            });
        }

        function openPreloadModal(productId, productName, currentStock) {
            currentPreloadProductId = productId;
            document.getElementById('preloadProductName').value = productName;
            document.getElementById('preloadCurrentStock').value = currentStock;
            document.getElementById('preloadAmount').value = currentStock;
            document.getElementById('preloadModal').classList.add('show');
        }

        function closePreloadModal() {
            document.getElementById('preloadModal').classList.remove('show');
            currentPreloadProductId = null;
        }

        async function confirmPreload() {
            const amount = parseInt(document.getElementById('preloadAmount').value);
            
            if (amount <= 0 || amount > 10000) {
                showWarning('预热数量必须在1-10000之间');
                return;
            }
            
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/stock/preload/${currentPreloadProductId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount: amount })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('库存预热成功');
                    closePreloadModal();
                    loadStockData();
                } else {
                    showError(result.message || '库存预热失败');
                }
            } catch (error) {
                console.error('库存预热失败:', error);
                showError('库存预热失败，请稍后重试');
            }
        }

        initAuth();
        loadStockData();
    </script>
</body>
</html>
