<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - 秒杀系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 28px;
            margin-right: 10px;
        }
        
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .login-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-name-header {
            font-size: 14px;
            font-weight: 500;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 主内容区域 */
        .main-content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin: 20px 0;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .page-header h1 {
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }
        
        .back-link {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .back-link:hover {
            color: #ee5a6f;
            transform: translateX(-5px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border-radius: 12px;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #ff6b6b;
        }

        .user-details {
            flex: 1;
        }

        .user-details h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .user-details p {
            opacity: 0.9;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            padding: 12px 25px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab:hover {
            color: #ff6b6b;
        }

        .tab.active {
            color: #ff6b6b;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ff6b6b;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .form-section h3 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ff6b6b;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: #ff6b6b;
            color: white;
        }

        .form-group input:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
            border-color: #e0e0e0;
        }

        .btn-primary {
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .history-table thead {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }

        .history-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        .history-table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.3s ease;
        }

        .history-table tbody tr:hover {
            background: #f8f9fa;
        }

        .history-table td {
            padding: 15px;
            font-size: 14px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #ff6b6b;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            
            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .user-info {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
        }

        /* 密码输入相关样式 */
        .password-input-wrapper {
            position: relative;
            width: 100%;
        }

        .password-input-wrapper input {
            width: 100%;
            padding-right: 40px;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            color: #666;
        }

        .form-group input:focus + .password-toggle {
            color: white;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .password-strength.weak {
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        .password-strength.medium {
            color: #ffc107;
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
        }

        .password-strength.strong {
            color: #28a745;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span>闪电秒杀</span>
            </div>
            <nav class="nav-menu" id="navMenu" style="display: none;">
                <a href="index.html" class="nav-link">首页</a>
                <a href="orders.html" class="nav-link">订单管理</a>
                <a href="activities.html" class="nav-link">活动管理</a>
                <a href="stock.html" class="nav-link">库存管理</a>
                <a href="product-management.html" class="nav-link">商品管理</a>
                <a href="dashboard.html" class="nav-link">数据监控</a>
                <a href="user-center.html" class="nav-link active">用户中心</a>
            </nav>
            <div class="user-section">
                <div class="user-info-header" id="userInfo" style="display: none;">
                    <span class="user-name-header" id="userNameHeader"></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
                <div class="login-notice" id="loginNotice">
                    <a href="login.html" class="login-link">请登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="main-content">
            <div class="page-header">
                <h1>👤 用户中心</h1>
                <a href="index.html" class="back-link">← 返回首页</a>
            </div>

        <div class="loading" id="loading" style="display: none;">
            加载中
        </div>

        <div id="userContent" style="display: none;">
            <div class="user-info">
                <div class="avatar">👤</div>
                <div class="user-details">
                    <h2 id="userName">用户名</h2>
                    <p id="userEmail">邮箱</p>
                    <p id="userPhone">手机号</p>
                    <p id="memberSince">加入时间</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>总订单数</h3>
                    <div class="value" id="totalOrders">0</div>
                </div>
                <div class="stat-card">
                    <h3>成功订单</h3>
                    <div class="value" id="successOrders">0</div>
                </div>
                <div class="stat-card">
                    <h3>失败订单</h3>
                    <div class="value" id="failedOrders">0</div>
                </div>
                <div class="stat-card">
                    <h3>总消费金额</h3>
                    <div class="value" id="totalSpent">¥0</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('profile')">个人资料</button>
                <button class="tab" onclick="switchTab('security')">安全设置</button>
                <button class="tab" onclick="switchTab('history')">秒杀历史</button>
            </div>

            <div class="tab-content active" id="profileTab">
                <div class="form-section">
                    <h3>基本信息</h3>
                    <div class="form-group">
                        <label>用户名：</label>
                        <input type="text" id="profileUsername" disabled>
                    </div>
                    <div class="form-group">
                        <label>邮箱：</label>
                        <input type="email" id="profileEmail" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>手机号：</label>
                        <input type="tel" id="profilePhone" placeholder="请输入手机号">
                    </div>
                    <button class="btn-primary" onclick="updateProfile()">保存修改</button>
                </div>
            </div>

            <div class="tab-content" id="securityTab">
                <div class="form-section">
                    <h3>修改密码</h3>
                    <div class="form-group">
                        <label>当前密码：</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="oldPassword" placeholder="请输入当前密码" maxlength="30">
                            <span class="password-toggle" onclick="togglePassword('oldPassword', this)">👁️</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>新密码：</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="newPassword" placeholder="请输入新密码（至少12位，包含大小写字母、数字和特殊符号）" oninput="checkPasswordStrength()" maxlength="30">
                            <span class="password-toggle" onclick="togglePassword('newPassword', this)">👁️</span>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                    </div>
                    <div class="form-group">
                        <label>确认密码：</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="confirmPassword" placeholder="请再次输入新密码" maxlength="30">
                            <span class="password-toggle" onclick="togglePassword('confirmPassword', this)">👁️</span>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="changePassword()">修改密码</button>
                </div>
            </div>

            <div class="tab-content" id="historyTab">
                <div class="loading" id="historyLoading" style="display: none;">
                    加载中
                </div>
                <div class="empty-state" id="historyEmpty" style="display: none;">
                    <h3>暂无秒杀记录</h3>
                    <p>您还没有参与过任何秒杀活动</p>
                </div>
                <table class="history-table" id="historyTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>商品名称</th>
                            <th>数量</th>
                            <th>金额</th>
                            <th>状态</th>
                            <th>参与时间</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script>

        function getToken() {
            return localStorage.getItem('auth_token');
        }

        function formatAmount(amount) {
            return '¥' + parseFloat(amount).toFixed(2);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function getOrderStatusText(status) {
            const statusMap = {
                'PENDING': '待支付',
                'PAID': '已支付',
                'SHIPPED': '已发货',
                'DELIVERED': '已送达',
                'CANCELLED': '已取消',
                'REFUNDED': '已退款'
            };
            return statusMap[status] || status;
        }

        function getOrderStatusBadge(status) {
            const isSuccess = status === 'PAID' || status === 'SHIPPED' || status === 'DELIVERED';
            return isSuccess ? 'status-success' : 'status-failed';
        }

        async function loadUserData() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            showLoading(true);
            try {
                console.log('开始加载用户数据，token:', token);
                console.log('API_BASE:', API_BASE);
                
                // 先测试单个API请求
                const profileResponse = await fetch(`${API_BASE}/user/profile`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                console.log('profileResponse状态:', profileResponse.status);
                
                if (!profileResponse.ok) {
                    const errorText = await profileResponse.text();
                    console.error('获取用户信息失败:', profileResponse.status, errorText);
                    if (profileResponse.status === 401) {
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`获取用户信息失败: ${profileResponse.status} ${errorText}`);
                }
                
                const profile = await profileResponse.json();
                console.log('获取到的用户信息:', profile);
                
                const statsResponse = await fetch(`${API_BASE}/user/stats`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                console.log('statsResponse状态:', statsResponse.status);
                
                if (!statsResponse.ok) {
                    const errorText = await statsResponse.text();
                    console.error('获取用户统计数据失败:', statsResponse.status, errorText);
                    throw new Error(`获取用户统计数据失败: ${statsResponse.status} ${errorText}`);
                }
                
                const stats = await statsResponse.json();
                console.log('获取到的用户统计数据:', stats);
                
                const historyResponse = await fetch(`${API_BASE}/user/seckill-history`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                console.log('historyResponse状态:', historyResponse.status);
                
                if (!historyResponse.ok) {
                    const errorText = await historyResponse.text();
                    console.error('获取秒杀历史失败:', historyResponse.status, errorText);
                    throw new Error(`获取秒杀历史失败: ${historyResponse.status} ${errorText}`);
                }
                
                const history = await historyResponse.json();
                console.log('获取到的秒杀历史:', history);

                displayProfile(profile);
                displayStats(stats);
                displayHistory(history);
                updateUserInfoHeader(profile.nickname || profile.username);
                showLoading(false);
            } catch (error) {
                console.error('加载用户数据失败:', error);
                showLoading(false);
                showError('加载用户数据失败，请稍后重试\n' + error.message);
            }
        }

        function displayProfile(profile) {
            document.getElementById('userName').textContent = profile.username;
            document.getElementById('userEmail').textContent = profile.email || '未设置';
            document.getElementById('userPhone').textContent = profile.phone || '未设置';
            document.getElementById('memberSince').textContent = '加入时间：' + formatDate(profile.createTime);
            
            document.getElementById('profileUsername').value = profile.username;
            document.getElementById('profileEmail').value = profile.email || '';
            document.getElementById('profilePhone').value = profile.phone || '';
        }

        function displayStats(stats) {
            document.getElementById('totalOrders').textContent = stats.totalOrders || 0;
            document.getElementById('successOrders').textContent = (stats.paidOrders || 0) + (stats.shippedOrders || 0) + (stats.deliveredOrders || 0);
            document.getElementById('failedOrders').textContent = stats.cancelledOrders || 0;
            document.getElementById('totalSpent').textContent = formatAmount(stats.totalSpent || 0);
        }

        function displayHistory(history) {
            const tbody = document.getElementById('historyBody');
            const table = document.getElementById('historyTable');
            const emptyState = document.getElementById('historyEmpty');
            
            if (!history.orders || history.orders.length === 0) {
                tbody.innerHTML = '';
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            table.style.display = 'table';
            emptyState.style.display = 'none';
            
            tbody.innerHTML = history.orders.map(order => {
                const productName = order.items && order.items.length > 0 
                    ? order.items[0].productName 
                    : '-';
                const quantity = order.items && order.items.length > 0 
                    ? order.items[0].quantity 
                    : '-';
                const statusBadge = getOrderStatusBadge(order.status);
                
                return `
                    <tr>
                        <td style="font-family: monospace; font-weight: bold;">${order.orderId}</td>
                        <td>${productName}</td>
                        <td>${quantity}</td>
                        <td style="font-weight: bold; color: #667eea;">${formatAmount(order.totalAmount)}</td>
                        <td><span class="status-badge ${statusBadge}">${getOrderStatusText(order.status)}</span></td>
                        <td>${formatDate(order.createdAt)}</td>
                    </tr>
                `;
            }).join('');
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('userContent').style.display = show ? 'none' : 'block';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
        }

        async function updateProfile() {
            const email = document.getElementById('profileEmail').value.trim();
            const phone = document.getElementById('profilePhone').value.trim();
            
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        phone: phone
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('个人信息更新成功');
                    loadUserData();
                } else {
                    showError(result.message || '更新失败');
                }
            } catch (error) {
                console.error('更新个人信息失败:', error);
                showError('更新个人信息失败，请稍后重试');
            }
        }

        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!oldPassword || !newPassword || !confirmPassword) {
                showWarning('请填写所有密码字段');
                return;
            }
            
            if (newPassword.length < 12) {
                showWarning('新密码长度不能少于12位');
                return;
            }
            
            if (!isPasswordStrong(newPassword)) {
                showWarning('新密码必须包含大小写字母、数字和特殊符号');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showWarning('两次输入的新密码不一致');
                return;
            }
            
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/user/change-password`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        oldPassword: oldPassword,
                        newPassword: newPassword
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('密码修改成功，请重新登录');
                    localStorage.removeItem('auth_token');
                    window.location.href = 'login.html';
                } else {
                    showError(result.message || '密码修改失败');
                }
            } catch (error) {
                console.error('修改密码失败:', error);
                showError('修改密码失败，请稍后重试');
            }
        }

        function isPasswordStrong(password) {
            if (password.length < 12) {
                return false;
            }
            
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>?]/.test(password);
            
            return hasUpperCase && hasLowerCase && hasDigit && hasSpecial;
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.textContent = '';
                strengthDiv.className = 'password-strength';
                return;
            }
            
            if (password.length < 12) {
                strengthDiv.textContent = '密码长度不足12位';
                strengthDiv.className = 'password-strength weak';
                return;
            }
            
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>?]/.test(password);
            
            const criteria = [hasUpperCase, hasLowerCase, hasDigit, hasSpecial];
            const metCriteria = criteria.filter(c => c).length;
            
            if (metCriteria === 4) {
                strengthDiv.textContent = '密码强度：强';
                strengthDiv.className = 'password-strength strong';
            } else if (metCriteria >= 2) {
                strengthDiv.textContent = `密码强度：中（还需要：${getMissingCriteria(criteria)}）`;
                strengthDiv.className = 'password-strength medium';
            } else {
                strengthDiv.textContent = `密码强度：弱（还需要：${getMissingCriteria(criteria)}）`;
                strengthDiv.className = 'password-strength weak';
            }
        }

        function getMissingCriteria(criteria) {
            const missing = [];
            if (!criteria[0]) missing.push('大写字母');
            if (!criteria[1]) missing.push('小写字母');
            if (!criteria[2]) missing.push('数字');
            if (!criteria[3]) missing.push('特殊符号');
            return missing.join('、');
        }

        function togglePassword(inputId, toggleElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                toggleElement.textContent = '🙈';
            } else {
                input.type = 'password';
                toggleElement.textContent = '👁️';
            }
        }

        // 初始化用户认证状态
        function initAuth() {
            const token = getToken();
            console.log('initAuth: token:', token);
            if (token) {
                // 尝试验证token的有效性
                console.log('initAuth: 开始验证token');
                fetch(`${API_BASE}/user/info`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => {
                    console.log('initAuth: 响应状态:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('initAuth: 响应数据:', data);
                    if (data.code === 0 && data.user) {
                        console.log('initAuth: token验证成功');
                        document.getElementById('userInfo').style.display = 'flex';
                        document.getElementById('loginNotice').style.display = 'none';
                        document.getElementById('navMenu').style.display = 'flex';
                        document.getElementById('userContent').style.display = 'block';
                        document.getElementById('userNameHeader').textContent = data.user.nickname || data.user.username || '用户';
                        // 验证成功后加载用户数据
                        loadUserData();
                    } else {
                        console.log('initAuth: token验证失败:', data);
                        // token无效，清除并跳转到登录页面
                        localStorage.removeItem('auth_token');
                        document.getElementById('userInfo').style.display = 'none';
                        document.getElementById('loginNotice').style.display = 'block';
                        document.getElementById('navMenu').style.display = 'none';
                        // 存储当前页面URL，以便登录后返回
                        localStorage.setItem('previous_url', window.location.href);
                        // 未授权时重定向到登录页面
                        window.location.href = 'login.html';
                    }
                })
                .catch(error => {
                    console.error('initAuth: 验证token失败:', error);
                    // 出错时清除token并跳转到登录页面
                    localStorage.removeItem('auth_token');
                    document.getElementById('userInfo').style.display = 'none';
                    document.getElementById('loginNotice').style.display = 'block';
                    document.getElementById('navMenu').style.display = 'none';
                    // 存储当前页面URL，以便登录后返回
                    localStorage.setItem('previous_url', window.location.href);
                    // 出错时重定向到登录页面
                    window.location.href = 'login.html';
                });
            } else {
                console.log('initAuth: 没有token');
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('loginNotice').style.display = 'block';
                document.getElementById('navMenu').style.display = 'none';
                // 存储当前页面URL，以便登录后返回
                localStorage.setItem('previous_url', window.location.href);
                // 未登录时重定向到登录页面
                window.location.href = 'login.html';
            }
        }

        function updateUserInfoHeader(username) {
            document.getElementById('userNameHeader').textContent = username;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('auth_token');
            window.location.href = 'login.html';
        }

        // 页面加载时初始化
        initAuth();
    </script>
</body>
</html>
