<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 28px;
            margin-right: 10px;
        }
        
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .login-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 内容区域 */
        .page-content {
            padding: 20px 0;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        /* 操作按钮 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ee5a6f, #c0392b);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(238, 90, 111, 0.4);
        }
        
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 商品列表 */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 20px;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        .table tr:hover {
            background-color: #f8f9fa;
        }
        
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .btn-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 2px rgba(255, 107, 107, 0.2);
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            
            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .card-body {
                padding: 10px;
            }
            
            .table th,
            .table td {
                padding: 8px;
                font-size: 12px;
            }
        }
        
        /* 自定义模态提示框 */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .result-modal .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .modal-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .modal-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span>闪电秒杀</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="orders.html" class="nav-link">订单管理</a>
                <a href="activities.html" class="nav-link">活动管理</a>
                <a href="stock.html" class="nav-link">库存管理</a>
                <a href="product-management.html" class="nav-link active">商品管理</a>
                <a href="dashboard.html" class="nav-link">数据监控</a>
                <a href="user-center.html" class="nav-link">用户中心</a>
            </nav>
            <div class="user-section">
                <div class="user-info" id="userInfo" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
                <div class="login-notice" id="loginNotice">
                    <a href="login.html" class="login-link">请登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container page-content">
        <h1 class="page-title">商品管理</h1>
        
        <!-- 操作按钮 -->
        <div class="action-bar">
            <div class="action-buttons">
                <button type="button" class="btn btn-primary" onclick="openCreateModal()">
                    新增商品
                </button>
                <button type="button" class="btn btn-danger" id="batchDeleteBtn" disabled>
                    批量删除
                </button>
            </div>
        </div>
        
        <!-- 商品列表 -->
        <div class="card">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll"></th>
                            <th>ID</th>
                            <th>商品名称</th>
                            <th>价格</th>
                            <th>库存</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="productList">
                        <!-- 商品列表将通过AJAX动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 新增商品模态框 -->
    <div class="modal" id="createProductModal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createProductModalLabel">新增商品</h5>
                <button type="button" class="btn-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="createProductForm">
                    <div class="form-group">
                        <label for="name" class="form-label">商品名称</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label">商品描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="price" class="form-label">价格</label>
                        <input type="number" class="form-control" id="price" name="price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="originalPrice" class="form-label">原价</label>
                        <input type="number" class="form-control" id="originalPrice" name="originalPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="stock" class="form-label">库存</label>
                        <input type="number" class="form-control" id="stock" name="stock" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="category" class="form-label">分类</label>
                        <input type="text" class="form-control" id="category" name="category">
                    </div>
                    <div class="form-group">
                        <label for="imageUrl" class="form-label">图片URL</label>
                        <input type="text" class="form-control" id="imageUrl" name="imageUrl">
                    </div>
                    <div class="form-group">
                        <label for="startTime" class="form-label">开始时间</label>
                        <input type="datetime-local" class="form-control" id="startTime" name="startTime">
                    </div>
                    <div class="form-group">
                        <label for="endTime" class="form-label">结束时间</label>
                        <input type="datetime-local" class="form-control" id="endTime" name="endTime">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">关闭</button>
                <button type="button" class="btn btn-primary" id="submitCreateProduct">提交</button>
            </div>
        </div>
    </div>
    
    <!-- 修改商品模态框 -->
    <div class="modal" id="updateProductModal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="updateProductModalLabel">修改商品</h5>
                <button type="button" class="btn-close" onclick="closeUpdateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="updateProductForm">
                    <input type="hidden" id="updateProductId" name="id">
                    <div class="form-group">
                        <label for="updateName" class="form-label">商品名称</label>
                        <input type="text" class="form-control" id="updateName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="updateDescription" class="form-label">商品描述</label>
                        <textarea class="form-control" id="updateDescription" name="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="updatePrice" class="form-label">价格</label>
                        <input type="number" class="form-control" id="updatePrice" name="price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="updateOriginalPrice" class="form-label">原价</label>
                        <input type="number" class="form-control" id="updateOriginalPrice" name="originalPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="updateStock" class="form-label">库存</label>
                        <input type="number" class="form-control" id="updateStock" name="stock" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="updateCategory" class="form-label">分类</label>
                        <input type="text" class="form-control" id="updateCategory" name="category">
                    </div>
                    <div class="form-group">
                        <label for="updateImageUrl" class="form-label">图片URL</label>
                        <input type="text" class="form-control" id="updateImageUrl" name="imageUrl">
                    </div>
                    <div class="form-group">
                        <label for="updateStartTime" class="form-label">开始时间</label>
                        <input type="datetime-local" class="form-control" id="updateStartTime" name="startTime">
                    </div>
                    <div class="form-group">
                        <label for="updateEndTime" class="form-label">结束时间</label>
                        <input type="datetime-local" class="form-control" id="updateEndTime" name="endTime">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeUpdateModal()">关闭</button>
                <button type="button" class="btn btn-primary" id="submitUpdateProduct">提交</button>
            </div>
        </div>
    </div>
    
    <!-- 自定义模态提示框 -->
    <div class="result-modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">✅</div>
            <h2 class="modal-title" id="modalTitle">操作成功</h2>
            <p class="modal-message" id="modalMessage">操作已完成</p>
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>
    
    <script>
        // 显示模态提示框
        function showModal(type, title, message) {
            const modal = document.getElementById('resultModal');
            const icon = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const messageEl = document.getElementById('modalMessage');
            
            if (type === 'success') {
                icon.textContent = '✅';
            } else {
                icon.textContent = '❌';
            }
            
            titleEl.textContent = title;
            messageEl.textContent = message;
            
            modal.style.display = 'flex';
        }
        
        // 关闭模态提示框
        function closeModal() {
            const modal = document.getElementById('resultModal');
            modal.style.display = 'none';
        }
        
        // 检查登录状态
        function checkLogin() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user_info');
            if (!token || !user) {
                showModal('error', '未登录', '请先登录');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return false;
            }
            return true;
        }
        
        // 更新用户信息显示
        function updateUserInfo() {
            const user = localStorage.getItem('user_info');
            const userInfo = document.getElementById('userInfo');
            const loginNotice = document.getElementById('loginNotice');
            const userName = document.getElementById('userName');
            
            if (user) {
                userInfo.style.display = 'flex';
                loginNotice.style.display = 'none';
                userName.textContent = JSON.parse(user).nickname || JSON.parse(user).username;
            } else {
                userInfo.style.display = 'none';
                loginNotice.style.display = 'block';
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_info');
            updateUserInfo();
            window.location.href = 'login.html';
        }
        
        // 打开新增商品模态框
        function openCreateModal() {
            document.getElementById('createProductModal').classList.add('show');
        }
        
        // 关闭新增商品模态框
        function closeCreateModal() {
            document.getElementById('createProductModal').classList.remove('show');
        }
        
        // 打开修改商品模态框
        function openUpdateModal() {
            document.getElementById('updateProductModal').classList.add('show');
        }
        
        // 关闭修改商品模态框
        function closeUpdateModal() {
            document.getElementById('updateProductModal').classList.remove('show');
        }
        
        // 页面加载时检查登录状态并获取商品列表
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkLogin()) {
                return;
            }
            
            updateUserInfo();
            loadProductList();
            
            // 全选/取消全选
            document.getElementById('selectAll').addEventListener('change', function() {
                const checkboxes = document.querySelectorAll('input[name="productId"]');
                checkboxes.forEach(checkbox => {
                    checkbox.checked = this.checked;
                });
                updateBatchDeleteBtn();
            });
            
            // 单个 checkbox 变化时更新批量删除按钮状态
            document.getElementById('productList').addEventListener('change', function(e) {
                if (e.target.name === 'productId') {
                    updateBatchDeleteBtn();
                }
            });
            
            // 批量删除按钮点击事件
            document.getElementById('batchDeleteBtn').addEventListener('click', function() {
                const selectedIds = getSelectedProductIds();
                if (selectedIds.length > 0) {
                    if (confirm('确定要删除选中的商品吗？')) {
                        batchDeleteProducts(selectedIds);
                    }
                }
            });
            
            // 新增商品提交
            document.getElementById('submitCreateProduct').addEventListener('click', function() {
                createProduct();
            });
            
            // 修改商品提交
            document.getElementById('submitUpdateProduct').addEventListener('click', function() {
                updateProduct();
            });
        });
        
        // 加载商品列表
        function loadProductList() {
            const token = localStorage.getItem('auth_token');
            axios.get('/api/admin/product/list', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
                .then(response => {
                    if (response.data.code === 0) {
                        const products = response.data.data;
                        const productList = document.getElementById('productList');
                        productList.innerHTML = '';
                        
                        products.forEach(product => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td><input type="checkbox" name="productId" value="${product.id}"></td>
                                <td>${product.id}</td>
                                <td>${product.name}</td>
                                <td>${product.price}</td>
                                <td>${product.stock}</td>
                                <td>${getStatusText(product)}</td>
                                <td>
                                    <button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px; margin-right: 5px;" onclick="editProduct(${product.id})">编辑</button>
                                    <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteProduct(${product.id})">删除</button>
                                </td>
                            `;
                            productList.appendChild(row);
                        });
                    } else {
                        showModal('error', '操作失败', '获取商品列表失败: ' + response.data.message);
                    }
                })
                .catch(error => {
                    showModal('error', '网络错误', '获取商品列表失败: ' + error.message);
                });
        }
        
        // 获取状态文本
        function getStatusText(product) {
            const now = new Date();
            const startTime = product.startTime ? new Date(product.startTime) : null;
            const endTime = product.endTime ? new Date(product.endTime) : null;
            
            if (!startTime || !endTime) {
                return '未设置时间';
            }
            
            if (now < startTime) {
                return '未开始';
            } else if (now > endTime) {
                return '已结束';
            } else {
                return '进行中';
            }
        }
        
        // 更新批量删除按钮状态
        function updateBatchDeleteBtn() {
            const selectedIds = getSelectedProductIds();
            const batchDeleteBtn = document.getElementById('batchDeleteBtn');
            batchDeleteBtn.disabled = selectedIds.length === 0;
        }
        
        // 获取选中的商品ID
        function getSelectedProductIds() {
            const checkboxes = document.querySelectorAll('input[name="productId"]:checked');
            const ids = [];
            checkboxes.forEach(checkbox => {
                ids.push(parseInt(checkbox.value));
            });
            return ids;
        }
        
        // 编辑商品
        function editProduct(productId) {
            const token = localStorage.getItem('auth_token');
            axios.get('/api/admin/product/detail/' + productId, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
                .then(response => {
                    if (response.data.code === 0) {
                        const product = response.data.data;
                        document.getElementById('updateProductId').value = product.id;
                        document.getElementById('updateName').value = product.name;
                        document.getElementById('updateDescription').value = product.description;
                        document.getElementById('updatePrice').value = product.price;
                        document.getElementById('updateOriginalPrice').value = product.originalPrice;
                        document.getElementById('updateStock').value = product.stock;
                        document.getElementById('updateCategory').value = product.category;
                        document.getElementById('updateImageUrl').value = product.imageUrl;
                        document.getElementById('updateStartTime').value = product.startTime ? product.startTime.replace(' ', 'T') : '';
                        document.getElementById('updateEndTime').value = product.endTime ? product.endTime.replace(' ', 'T') : '';
                        
                        openUpdateModal();
                    } else {
                        showModal('error', '操作失败', '获取商品详情失败: ' + response.data.message);
                    }
                })
                .catch(error => {
                    showModal('error', '网络错误', '获取商品详情失败: ' + error.message);
                });
        }
        
        // 删除商品
        function deleteProduct(productId) {
            if (confirm('确定要删除这个商品吗？')) {
                const token = localStorage.getItem('auth_token');
                axios.delete('/api/admin/product/delete/' + productId, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => {
                    if (response.data.code === 0) {
                        showModal('success', '操作成功', '商品删除成功');
                        loadProductList();
                    } else {
                        showModal('error', '操作失败', '商品删除失败: ' + response.data.message);
                    }
                })
                .catch(error => {
                    showModal('error', '网络错误', '商品删除失败: ' + error.message);
                });
            }
        }
        
        // 批量删除商品
        function batchDeleteProducts(productIds) {
            const token = localStorage.getItem('auth_token');
            axios.delete('/api/admin/product/batch-delete', {
                data: productIds,
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => {
                if (response.data.code === 0) {
                    showModal('success', '操作成功', '商品批量删除成功');
                    loadProductList();
                } else {
                    showModal('error', '操作失败', '商品批量删除失败: ' + response.data.message);
                }
            })
            .catch(error => {
                showModal('error', '网络错误', '商品批量删除失败: ' + error.message);
            });
        }
        
        // 创建商品
        function createProduct() {
            const form = document.getElementById('createProductForm');
            const formData = new FormData(form);
            const productData = {
                name: formData.get('name'),
                description: formData.get('description'),
                price: formData.get('price'),
                originalPrice: formData.get('originalPrice'),
                stock: parseInt(formData.get('stock')),
                category: formData.get('category'),
                imageUrl: formData.get('imageUrl'),
                startTime: formData.get('startTime') ? formData.get('startTime').replace('T', ' ') : null,
                endTime: formData.get('endTime') ? formData.get('endTime').replace('T', ' ') : null
            };
            
            const token = localStorage.getItem('auth_token');
            axios.post('/api/admin/product/create', productData, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => {
                if (response.data.code === 0) {
                    showModal('success', '操作成功', '商品创建成功');
                    closeCreateModal();
                    form.reset();
                    loadProductList();
                } else {
                    showModal('error', '操作失败', '商品创建失败: ' + response.data.message);
                }
            })
            .catch(error => {
                showModal('error', '网络错误', '商品创建失败: ' + error.message);
            });
        }
        
        // 更新商品
        function updateProduct() {
            const form = document.getElementById('updateProductForm');
            const formData = new FormData(form);
            const productId = parseInt(formData.get('id'));
            const productData = {
                name: formData.get('name'),
                description: formData.get('description'),
                price: formData.get('price'),
                originalPrice: formData.get('originalPrice'),
                stock: parseInt(formData.get('stock')),
                category: formData.get('category'),
                imageUrl: formData.get('imageUrl'),
                startTime: formData.get('startTime') ? formData.get('startTime').replace('T', ' ') : null,
                endTime: formData.get('endTime') ? formData.get('endTime').replace('T', ' ') : null
            };
            
            const token = localStorage.getItem('auth_token');
            axios.put('/api/admin/product/update/' + productId, productData, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => {
                if (response.data.code === 0) {
                    showModal('success', '操作成功', '商品更新成功');
                    closeUpdateModal();
                    loadProductList();
                } else {
                    showModal('error', '操作失败', '商品更新失败: ' + response.data.message);
                }
            })
            .catch(error => {
                showModal('error', '网络错误', '商品更新失败: ' + error.message);
            });
        }
    </script>
</body>
</html>
