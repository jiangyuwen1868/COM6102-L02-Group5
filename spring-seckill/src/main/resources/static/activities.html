<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动管理 - 秒杀系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 28px;
            margin-right: 10px;
        }
        
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .login-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 页面内容 */
        .page-content {
            padding: 20px 0;
        }

        .page-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .filter-group select {
            padding: 10px 15px;
            border: 2px solid #ff6b6b;
            border-radius: 20px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-group select:hover {
            background: #ff6b6b;
            color: white;
        }

        .btn-create {
            padding: 10px 25px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .activity-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .activity-header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 20px;
            position: relative;
        }

        .activity-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
        }

        .activity-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .activity-desc {
            font-size: 14px;
            opacity: 0.9;
        }

        .activity-body {
            padding: 20px;
        }

        .activity-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .info-value.highlight {
            color: #ff6b6b;
            font-size: 16px;
        }

        .countdown {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .countdown-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .countdown-time {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .countdown-time.ended {
            color: #dc3545;
        }

        .activity-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }

        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.3);
        }

        .btn-edit {
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            color: #333;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(254, 202, 87, 0.3);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ee5a6f, #c0392b);
            color: white;
        }

        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(238, 90, 111, 0.3);
        }

        .loading {
            text-align: center;
            padding: 60px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #333;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ff6b6b;
        }

        .modal-header h2 {
            color: #ff6b6b;
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel-modal {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-cancel-modal:hover {
            background: #5a6268;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.3);
        }

        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            
            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .activities-grid {
                grid-template-columns: 1fr;
            }
            
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span>闪电秒杀</span>
            </div>
            <nav class="nav-menu" id="navMenu" style="display: none;">
                <a href="index.html" class="nav-link">首页</a>
                <a href="orders.html" class="nav-link">订单管理</a>
                <a href="activities.html" class="nav-link active">活动管理</a>

    </div>
    
    <div class="container page-content">
        <h1 class="page-title">🎯 活动管理</h1>

        <div class="stats-cards">
            <div class="stat-card">
                <h3>总活动数</h3>
                <div class="value" id="totalActivities">0</div>

            <div class="stat-card">
                <h3>即将开始</h3>
                <div class="value" id="upcomingActivities">0</div>

            <div class="stat-card">
                <h3>进行中</h3>
                <div class="value" id="activeActivities">0</div>
            </div>

        <div class="action-bar">

        <div class="modal" id="statsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="statsModalTitle">活动统计</h2>
                <button class="close-btn" onclick="closeStatsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="stats-cards" id="activityStats">
                    <!-- 统计数据将通过JavaScript动态填充 -->
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>活动详情：</label>
                    <div id="activityDetails" style="padding: 15px; background: #f8f9fa; border-radius: 5px;">
                        <!-- 活动详情将通过JavaScript动态填充 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="action-btn btn-cancel-modal" onclick="closeStatsModal()">关闭</button>

    <script src="modal.js"></script>
    <script>
        const API_BASE = window.location.protocol + '//' + window.location.host + '/api';
        let currentEditingId = null;
        let countdownIntervals = {};

        // 检查登录状态
        function checkLogin() {
            const token = localStorage.getItem('auth_token');
            const userInfo = document.getElementById('userInfo');
            const loginNotice = document.getElementById('loginNotice');
            const userName = document.getElementById('userName');
            const navMenu = document.getElementById('navMenu');
            const pageContent = document.querySelector('.page-content');
            
            if (token) {
                // 尝试获取用户信息
                fetch(`${API_BASE}/user/info`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0 && data.user) {
                        userName.textContent = data.user.nickname || data.user.username || '用户';
                        userInfo.style.display = 'flex';
                        loginNotice.style.display = 'none';
                        navMenu.style.display = 'flex';
                        if (pageContent) pageContent.style.display = 'block';
                    } else {
                        userInfo.style.display = 'none';
                        loginNotice.style.display = 'block';
                        navMenu.style.display = 'none';
                        if (pageContent) pageContent.style.display = 'none';
                        // 存储当前页面URL，以便登录后返回
                        localStorage.setItem('previous_url', window.location.href);
                        // 未授权时重定向到登录页面
                        window.location.href = 'login.html';
                    }
                })
                .catch(error => {
                    console.error('获取用户信息失败:', error);
                    userInfo.style.display = 'none';
                    loginNotice.style.display = 'block';
                    navMenu.style.display = 'none';
                    if (pageContent) pageContent.style.display = 'none';
                    // 存储当前页面URL，以便登录后返回
                    localStorage.setItem('previous_url', window.location.href);
                    // 出错时重定向到登录页面
                    window.location.href = 'login.html';
                });
            } else {
                userInfo.style.display = 'none';
                loginNotice.style.display = 'block';
                navMenu.style.display = 'none';
                if (pageContent) pageContent.style.display = 'none';
                // 存储当前页面URL，以便登录后返回
                localStorage.setItem('previous_url', window.location.href);
                // 未登录时重定向到登录页面
                window.location.href = 'login.html';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('auth_token');
            // 存储当前页面URL，以便登录后返回
            localStorage.setItem('previous_url', window.location.href);
            window.location.href = 'login.html';
        }

        function getToken() {
            const token = localStorage.getItem('auth_token');
            console.log('从localStorage获取token:', token);
            console.log('localStorage中的所有键:', Object.keys(localStorage));
            return token;
        }
        
        // 页面加载时检查登录状态
        checkLogin();

        function formatAmount(amount) {
            return '¥' + parseFloat(amount).toFixed(2);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                // 处理数组格式的日期，例如 [2026, 3, 9, 17, 25, 1]
                if (Array.isArray(dateString)) {
                    if (dateString.length >= 6) {
                        const year = dateString[0];
                        const month = String(dateString[1]).padStart(2, '0');
                        const day = String(dateString[2]).padStart(2, '0');
                        const hour = String(dateString[3]).padStart(2, '0');
                        const minute = String(dateString[4]).padStart(2, '0');
                        const second = String(dateString[5]).padStart(2, '0');
                        return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
                    }
                    return dateString.join('-');
                }
                // 处理字符串格式的日期
                if (typeof dateString === 'string') {
                    // 如果是 LocalDateTime 格式，替换 'T' 为空格
                    if (dateString.includes('T')) {
                        dateString = dateString.replace('T', ' ');
                        // 移除毫秒部分（如果有）
                        if (dateString.includes('.')) {
                            dateString = dateString.split('.')[0];
                        }
                    }
                    return dateString;
                }
                // 如果是其他类型，尝试转换为字符串
                return String(dateString);
            } catch (error) {
                console.error('日期处理失败:', error, '日期值:', dateString);
                return '-';
            }
        }

        function getStatusText(status) {
            const statusMap = {
                'UPCOMING': '即将开始',
                'ACTIVE': '进行中',
                'ENDED': '已结束',
                'CANCELLED': '已取消'
            };
            return statusMap[status] || status;
        }

        function getStatusColor(status) {
            const colorMap = {
                'UPCOMING': '#ffc107',
                'ACTIVE': '#28a745',
                'ENDED': '#6c757d',
                'CANCELLED': '#dc3545'
            };
            return colorMap[status] || '#666';
        }

        async function loadActivities() {
            const token = getToken();
            console.log('获取到的token:', token);
            if (!token) {
                console.log('token为空，重定向到登录页面');
                window.location.href = 'login.html';
                return;
            }

            showLoading(true);
            try {
                const url = `${API_BASE}/activities`;
                console.log('发送请求到:', url);
                console.log('请求头:', { 'Authorization': 'Bearer ' + token });
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                console.log('响应状态:', response.status);
                console.log('响应状态文本:', response.statusText);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('获取活动列表失败:', response.status, response.statusText, errorText);
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        console.log('未授权，重定向到登录页面');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`获取活动列表失败: ${response.status} ${response.statusText} - ${errorText}`);
                }
                
                const activities = await response.json();
                console.log('获取到的活动列表:', activities);
                displayActivities(activities);
                updateStats(activities);
                loadProducts();
                showLoading(false);
            } catch (error) {
                console.error('加载活动失败:', error);
                showLoading(false);
                showError('加载活动失败: ' + error.message);
            }
        }

        async function loadProducts() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/product/list`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('获取商品列表失败:', response.status, response.statusText, errorText);
                    if (response.status === 401) {
                        // 未授权，重定向到登录页面
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error(`获取商品列表失败: ${response.status} ${response.statusText} - ${errorText}`);
                }
                
                const result = await response.json();
                console.log('获取到的商品列表:', result);
                if (result.code === 0 && result.data) {
                    const products = result.data;
                    const select = document.getElementById('productSelect');
                    select.innerHTML = '<option value="">请选择商品</option>' + 
                        products.map(p => `<option value="${p.id}">${p.name} - ${formatAmount(p.price)}</option>`).join('');
                }
            } catch (error) {
                console.error('加载商品列表失败:', error);
                showError('加载商品列表失败: ' + error.message);
            }
        }

        function displayActivities(activities) {
            const grid = document.getElementById('activitiesGrid');
            const emptyState = document.getElementById('emptyState');
            
            const statusFilter = document.getElementById('statusFilter').value;
            const filteredActivities = statusFilter 
                ? activities.filter(a => a.status === statusFilter)
                : activities;
            
            if (!filteredActivities || filteredActivities.length === 0) {
                grid.innerHTML = '';
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = filteredActivities.map(activity => {
                const statusColor = getStatusColor(activity.status);
                const countdownId = `countdown-${activity.id}`;
                
                let actionButtons = '';
                if (activity.status === 'UPCOMING' || activity.status === 'ACTIVE') {
                    actionButtons = `
                        <button class="action-btn btn-edit" onclick="editActivity(${activity.id})">编辑</button>
                        <button class="action-btn btn-cancel" onclick="cancelActivity(${activity.id})">取消</button>
                    `;
                }
                
                return `
                    <div class="activity-card">
                        <div class="activity-header" style="background: linear-gradient(135deg, ${statusColor} 0%, ${statusColor}dd 100%);">
                            <div class="activity-status">${getStatusText(activity.status)}</div>
                            <div class="activity-name">${activity.name}</div>
                            <div class="activity-desc">${activity.description || '暂无描述'}</div>
                        </div>
                        <div class="activity-body">
                            <div class="activity-info">
                                <div class="info-item">
                                    <span class="info-label">秒杀价格</span>
                                    <span class="info-value highlight">${formatAmount(activity.seckillPrice)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">秒杀库存</span>
                                    <span class="info-value">${activity.stock}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">开始时间</span>
                                    <span class="info-value">${formatDate(activity.startTime)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">结束时间</span>
                                    <span class="info-value">${formatDate(activity.endTime)}</span>
                                </div>
                            </div>
                            <div class="countdown">
                                <div class="countdown-label">${activity.status === 'UPCOMING' ? '距离开始' : activity.status === 'ACTIVE' ? '距离结束' : '活动已'}</div>
                                <div class="countdown-time ${activity.status === 'ENDED' ? 'ended' : ''}" id="${countdownId}">--:--:--</div>
                            </div>
                            <div class="activity-actions">
                                <button class="action-btn btn-view" onclick="viewActivityStats(${activity.id})">查看统计</button>
                                ${actionButtons}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            startCountdowns(filteredActivities);
        }

        function startCountdowns(activities) {
            Object.values(countdownIntervals).forEach(interval => clearInterval(interval));
            countdownIntervals = {};
            
            activities.forEach(activity => {
                if (activity.status === 'UPCOMING' || activity.status === 'ACTIVE') {
                    const targetTimeStr = activity.status === 'UPCOMING' ? activity.startTime : activity.endTime;
                    let targetTime;
                    
                    try {
                        // 处理数组格式的日期，例如 [2026, 3, 9, 17, 25, 1]
                        if (Array.isArray(targetTimeStr)) {
                            if (targetTimeStr.length >= 6) {
                                const year = targetTimeStr[0];
                                const month = targetTimeStr[1] - 1; // 月份从0开始
                                const day = targetTimeStr[2];
                                const hour = targetTimeStr[3];
                                const minute = targetTimeStr[4];
                                const second = targetTimeStr[5];
                                targetTime = new Date(year, month, day, hour, minute, second);
                            } else {
                                throw new Error('无效的日期数组格式');
                            }
                        }
                        // 处理字符串格式的日期
                        else if (typeof targetTimeStr === 'string') {
                            // 如果是 LocalDateTime 格式，替换 'T' 为空格
                            let processedTimeStr = targetTimeStr;
                            if (processedTimeStr.includes('T')) {
                                processedTimeStr = processedTimeStr.replace('T', ' ');
                                // 移除毫秒部分（如果有）
                                if (processedTimeStr.includes('.')) {
                                    processedTimeStr = processedTimeStr.split('.')[0];
                                }
                            }
                            targetTime = new Date(processedTimeStr);
                        }
                        // 处理其他类型的日期
                        else {
                            targetTime = new Date(targetTimeStr);
                        }
                        
                        // 检查日期是否有效
                        if (isNaN(targetTime.getTime())) {
                            console.error('无效的日期:', targetTimeStr);
                            return;
                        }
                        
                        const countdownId = `countdown-${activity.id}`;
                        
                        const updateCountdown = () => {
                            const now = new Date();
                            const diff = targetTime - now;
                            
                            if (diff <= 0) {
                                document.getElementById(countdownId).textContent = '00:00:00';
                                document.getElementById(countdownId).classList.add('ended');
                                clearInterval(countdownIntervals[countdownId]);
                                return;
                            }
                            
                            const hours = Math.floor(diff / (1000 * 60 * 60));
                            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                            
                            document.getElementById(countdownId).textContent = 
                                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                        };
                        
                        updateCountdown();
                        countdownIntervals[countdownId] = setInterval(updateCountdown, 1000);
                    } catch (error) {
                        console.error('倒计时初始化失败:', error, '日期值:', targetTimeStr);
                        const countdownId = `countdown-${activity.id}`;
                        document.getElementById(countdownId).textContent = '--:--:--';
                    }
                }
            });
        }

        function updateStats(activities) {
            const stats = {
                totalActivities: activities.length,
                upcomingActivities: activities.filter(a => a.status === 'UPCOMING').length,
                activeActivities: activities.filter(a => a.status === 'ACTIVE').length,
                endedActivities: activities.filter(a => a.status === 'ENDED').length
            };
            
            document.getElementById('totalActivities').textContent = stats.totalActivities;
            document.getElementById('upcomingActivities').textContent = stats.upcomingActivities;
            document.getElementById('activeActivities').textContent = stats.activeActivities;
            document.getElementById('endedActivities').textContent = stats.endedActivities;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function filterActivities() {
            loadActivities();
        }

        function openCreateModal() {
            currentEditingId = null;
            document.getElementById('modalTitle').textContent = '创建秒杀活动';
            document.getElementById('activityName').value = '';
            document.getElementById('activityDesc').value = '';
            document.getElementById('productSelect').value = '';
            document.getElementById('seckillPrice').value = '';
            document.getElementById('seckillStock').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
            document.getElementById('createModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('createModal').classList.remove('show');
            currentEditingId = null;
        }

        async function saveActivity() {
            const name = document.getElementById('activityName').value.trim();
            const desc = document.getElementById('activityDesc').value.trim();
            const productId = document.getElementById('productSelect').value;
            const price = document.getElementById('seckillPrice').value;
            const stock = document.getElementById('seckillStock').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            
            if (!name || !productId || !price || !stock || !startTime || !endTime) {
                showWarning('请填写所有必填项');
                return;
            }
            
            const token = getToken();
            try {
                const url = currentEditingId 
                    ? `${API_BASE}/activities/${currentEditingId}`
                    : `${API_BASE}/activities`;
                
                const method = currentEditingId ? 'PUT' : 'POST';
                
                // 转换时间格式为后端期望的格式
                const formatDateTime = (dateTimeStr) => {
                    if (!dateTimeStr) return dateTimeStr;
                    // 将 YYYY-MM-DDTHH:mm 转换为 YYYY-MM-DD HH:mm:ss
                    return dateTimeStr.replace('T', ' ') + ':00';
                };
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        description: desc,
                        productId: parseInt(productId),
                        seckillPrice: price,
                        stock: parseInt(stock),
                        startTime: formatDateTime(startTime),
                        endTime: formatDateTime(endTime)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess(currentEditingId ? '活动更新成功' : '活动创建成功');
                    closeModal();
                    loadActivities();
                } else {
                    showError(result.message || '操作失败');
                }
            } catch (error) {
                console.error('保存活动失败:', error);
                showError('保存活动失败，请稍后重试');
            }
        }

        async function editActivity(id) {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/activities/${id}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const activity = await response.json();
                
                currentEditingId = id;
                document.getElementById('modalTitle').textContent = '编辑秒杀活动';
                document.getElementById('activityName').value = activity.name;
                document.getElementById('activityDesc').value = activity.description || '';
                document.getElementById('productSelect').value = activity.productId;
                document.getElementById('seckillPrice').value = activity.seckillPrice;
                document.getElementById('seckillStock').value = activity.stock;
                document.getElementById('startTime').value = activity.startTime;
                document.getElementById('endTime').value = activity.endTime;
                document.getElementById('createModal').classList.add('show');
            } catch (error) {
                console.error('加载活动信息失败:', error);
                showError('加载活动信息失败');
            }
        }

        async function cancelActivity(id) {
            showConfirm('确定要取消这个活动吗？', async function() {
                const token = getToken();
                try {
                    const response = await fetch(`${API_BASE}/activities/${id}/cancel`, {
                         method: 'POST', 
                         headers: { 'Authorization': 'Bearer ' + token } 
                     });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showSuccess('活动已取消');
                        loadActivities();
                    } else {
                        showError(result.message || '取消活动失败');
                    }
                } catch (error) {
                    console.error('取消活动失败:', error);
                    showError('取消活动失败，请稍后重试');
                }
            });
        }

        function closeStatsModal() {
            document.getElementById('statsModal').classList.remove('show');
        }

        async function viewActivityStats(id) {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/activities/${id}/stats`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const stats = await response.json();
                
                // 填充统计数据
                document.getElementById('statsModalTitle').textContent = `${stats.activityName || '活动'} - 统计信息`;
                document.getElementById('activityStats').innerHTML = `
                    <div class="stat-card">
                        <h3>总库存</h3>
                        <div class="value">${stats.totalStock || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>已售出</h3>
                        <div class="value">${stats.soldCount || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>剩余库存</h3>
                        <div class="value">${stats.remainingStock || (stats.totalStock || 0)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>参与人数</h3>
                        <div class="value">${stats.participantCount || 0}</div>
                    </div>
                `;
                
                // 填充活动详情
                document.getElementById('activityDetails').innerHTML = `
                    <p><strong>活动名称：</strong>${stats.activityName || '-'}</p>
                    <p><strong>活动状态：</strong>${getStatusText(stats.status || '')}</p>
                    <p><strong>秒杀价格：</strong>${formatAmount(stats.seckillPrice || 0)}</p>
                    <p><strong>开始时间：</strong>${formatDate(stats.startTime)}</p>
                    <p><strong>结束时间：</strong>${formatDate(stats.endTime)}</p>
                    <p><strong>创建时间：</strong>${formatDate(stats.createdAt)}</p>
                `;
                
                // 显示模态框
                document.getElementById('statsModal').classList.add('show');
            } catch (error) {
                console.error('获取活动统计失败:', error);
                showError('获取活动统计失败');
            }
        }

        loadActivities();
    </script>
</body>
</html>
