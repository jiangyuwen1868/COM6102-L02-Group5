<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据监控 - 秒杀系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 28px;
            margin-right: 10px;
        }
        
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .login-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 页面内容 */
        .page-content {
            padding: 20px 0;
        }

        .page-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 25px;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .trend {
            font-size: 12px;
            opacity: 0.8;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .top-products-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .product-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .product-rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .product-stats {
            font-size: 12px;
            color: #666;
        }

        .product-sales {
            font-weight: bold;
            color: #ff6b6b;
            font-size: 16px;
        }

        .system-health {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .health-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .health-label {
            font-weight: bold;
            color: #333;
        }

        .health-value {
            font-weight: bold;
        }

        .health-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-healthy {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .realtime-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .realtime-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .realtime-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .realtime-card h4 {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .realtime-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #333;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .header .container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            
            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .action-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span>闪电秒杀</span>
            </div>
            <nav class="nav-menu" id="navMenu" style="display: none;">
                <a href="index.html" class="nav-link">首页</a>
                <a href="orders.html" class="nav-link">订单管理</a>
                <a href="activities.html" class="nav-link">活动管理</a>
                <a href="stock.html" class="nav-link">库存管理</a>
                <a href="product-management.html" class="nav-link">商品管理</a>
                <a href="dashboard.html" class="nav-link active">数据监控</a>
                <a href="user-center.html" class="nav-link">用户中心</a>
            </nav>
            <div class="user-section">
                <div class="user-info" id="userInfo" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
                <div class="login-notice" id="loginNotice">
                    <a href="login.html" class="login-link">请登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container page-content">
        <h1 class="page-title">📊 数据监控</h1>
        
        <div class="action-bar">
            <button class="refresh-btn" onclick="loadDashboardData()">🔄 刷新数据</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            加载中
        </div>

        <div id="dashboardContent" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>总订单数</h3>
                    <div class="value" id="totalOrders">0</div>
                    <div class="trend">累计订单</div>
                </div>
                <div class="stat-card">
                    <h3>总销售额</h3>
                    <div class="value" id="totalRevenue">¥0</div>
                    <div class="trend">累计收入</div>
                </div>
                <div class="stat-card">
                    <h3>用户总数</h3>
                    <div class="value" id="totalUsers">0</div>
                    <div class="trend">注册用户</div>
                </div>
                <div class="stat-card">
                    <h3>商品总数</h3>
                    <div class="value" id="totalProducts">0</div>
                    <div class="trend">上架商品</div>
                </div>
                <div class="stat-card">
                    <h3>活动总数</h3>
                    <div class="value" id="totalActivities">0</div>
                    <div class="trend">秒杀活动</div>
                </div>
                <div class="stat-card">
                    <h3>进行中活动</h3>
                    <div class="value" id="activeActivities">0</div>
                    <div class="trend">当前活跃</div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="panel">
                    <h2>🔥 热门商品 TOP 10</h2>
                    <div class="loading" id="topProductsLoading" style="display: none;">
                        加载中
                    </div>
                    <div class="empty-state" id="topProductsEmpty" style="display: none;">
                        <h3>暂无数据</h3>
                        <p>还没有商品销售数据</p>
                    </div>
                    <div class="top-products-list" id="topProductsList">
                    </div>
                </div>

                <div class="panel">
                    <h2>⚡ 实时数据</h2>
                    <div class="realtime-stats">
                        <div class="realtime-card">
                            <h4>最近1小时订单</h4>
                            <div class="value" id="recentOrders">0</div>
                        </div>
                        <div class="realtime-card">
                            <h4>最近1小时销售额</h4>
                            <div class="value" id="recentRevenue">¥0</div>
                        </div>
                        <div class="realtime-card">
                            <h4>Redis连接数</h4>
                            <div class="value" id="redisConnections">0</div>
                        </div>
                        <div class="realtime-card">
                            <h4>更新时间</h4>
                            <div class="value" id="updateTime" style="font-size: 14px;">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="panel">
                    <h2>💻 系统健康状态</h2>
                    <div class="loading" id="healthLoading" style="display: none;">
                        加载中
                    </div>
                    <div class="system-health" id="systemHealth">
                    </div>
                </div>

                <div class="panel">
                    <h2>📈 订单状态分布</h2>
                    <div class="system-health" id="orderStatusDistribution">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script>
        const API_BASE = window.location.protocol + '//' + window.location.host + '/api';

        // 检查登录状态
        function checkLogin() {
            const token = localStorage.getItem('auth_token');
            const userInfo = document.getElementById('userInfo');
            const loginNotice = document.getElementById('loginNotice');
            const userName = document.getElementById('userName');
            const navMenu = document.getElementById('navMenu');
            const pageContent = document.querySelector('.page-content');
            
            if (token) {
                // 尝试获取用户信息
                fetch(`${API_BASE}/user/info`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0 && data.user) {
                        userName.textContent = data.user.nickname || data.user.username || '用户';
                        userInfo.style.display = 'flex';
                        loginNotice.style.display = 'none';
                        navMenu.style.display = 'flex';
                        if (pageContent) pageContent.style.display = 'block';
                    } else {
                        userInfo.style.display = 'none';
                        loginNotice.style.display = 'block';
                        navMenu.style.display = 'none';
                        if (pageContent) pageContent.style.display = 'none';
                        // 存储当前页面URL，以便登录后返回
                        localStorage.setItem('previous_url', window.location.href);
                        // 未授权时重定向到登录页面
                        window.location.href = 'login.html';
                    }
                })
                .catch(error => {
                    console.error('获取用户信息失败:', error);
                    userInfo.style.display = 'none';
                    loginNotice.style.display = 'block';
                    navMenu.style.display = 'none';
                    if (pageContent) pageContent.style.display = 'none';
                    // 存储当前页面URL，以便登录后返回
                    localStorage.setItem('previous_url', window.location.href);
                    // 出错时重定向到登录页面
                    window.location.href = 'login.html';
                });
            } else {
                userInfo.style.display = 'none';
                loginNotice.style.display = 'block';
                navMenu.style.display = 'none';
                if (pageContent) pageContent.style.display = 'none';
                // 存储当前页面URL，以便登录后返回
                localStorage.setItem('previous_url', window.location.href);
                // 未登录时重定向到登录页面
                window.location.href = 'login.html';
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('auth_token');
            // 存储当前页面URL，以便登录后返回
            localStorage.setItem('previous_url', window.location.href);
            window.location.href = 'login.html';
        }

        function getToken() {
            return localStorage.getItem('auth_token');
        }
        
        // 页面加载时检查登录状态
        checkLogin();

        function formatAmount(amount) {
            return '¥' + parseFloat(amount).toFixed(2);
        }

        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toLocaleString();
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function getHealthStatus(status) {
            const statusMap = {
                'HEALTHY': { class: 'status-healthy', text: '健康' },
                'WARNING': { class: 'status-warning', text: '警告' },
                'ERROR': { class: 'status-error', text: '错误' }
            };
            return statusMap[status] || { class: '', text: status };
        }

        async function loadDashboardData() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            showLoading(true);
            try {
                const [statsResponse, realtimeResponse, topProductsResponse, healthResponse] = await Promise.all([
                    fetch(`${API_BASE}/dashboard/stats`, { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch(`${API_BASE}/dashboard/realtime`, { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch(`${API_BASE}/dashboard/top-products`, { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch(`${API_BASE}/dashboard/system-health`, { headers: { 'Authorization': 'Bearer ' + token } })
                ]);

                const stats = await statsResponse.json();
                const realtime = await realtimeResponse.json();
                const topProducts = await topProductsResponse.json();
                const health = await healthResponse.json();

                displayStats(stats);
                displayRealtime(realtime);
                displayTopProducts(topProducts);
                displaySystemHealth(health);
                showLoading(false);
            } catch (error) {
                console.error('加载仪表盘数据失败:', error);
                showLoading(false);
                // Handle potential error responses
                if (!statsResponse.ok) {
                    console.error('Stats API error:', statsResponse.status);
                }
                if (!realtimeResponse.ok) {
                    console.error('Realtime API error:', realtimeResponse.status);
                }
                if (!topProductsResponse.ok) {
                    console.error('Top Products API error:', topProductsResponse.status);
                }
                if (!healthResponse.ok) {
                    console.error('Health API error:', healthResponse.status);
                }
                showError('加载数据失败，请稍后重试');
             }
        }

        function displayStats(stats) {
            console.log('Stats data:', stats);
            document.getElementById('totalOrders').textContent = formatNumber(stats.totalOrders || 0);
            document.getElementById('totalRevenue').textContent = formatAmount(stats.totalRevenue || 0);
            document.getElementById('totalUsers').textContent = formatNumber(stats.totalUsers || 0);
            document.getElementById('totalProducts').textContent = formatNumber(stats.totalProducts || 0);
            document.getElementById('totalActivities').textContent = formatNumber(stats.totalActivities || 0);
            document.getElementById('activeActivities').textContent = formatNumber(stats.activeActivities || 0);

            const orderStatusDistribution = document.getElementById('orderStatusDistribution');
            const totalOrders = stats.totalOrders || 0;
            const maxOrders = Math.max(
                stats.pendingOrders || 0,
                stats.paidOrders || 0,
                stats.shippedOrders || 0,
                stats.deliveredOrders || 0,
                stats.cancelledOrders || 0
            );

            const statusItems = [
                { label: '待支付', value: stats.pendingOrders || 0, color: '#ffc107' },
                { label: '已支付', value: stats.paidOrders || 0, color: '#28a745' },
                { label: '已发货', value: stats.shippedOrders || 0, color: '#6610f2' },
                { label: '已送达', value: stats.deliveredOrders || 0, color: '#17a2b8' },
                { label: '已取消', value: stats.cancelledOrders || 0, color: '#dc3545' }
            ];

            orderStatusDistribution.innerHTML = statusItems.map(item => {
                const percentage = totalOrders > 0 ? (item.value / totalOrders * 100).toFixed(1) : 0;
                const width = maxOrders > 0 ? (item.value / maxOrders * 100) : 0;
                
                return `
                    <div class="health-item">
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span class="health-label">${item.label}</span>
                                <span class="health-value">${formatNumber(item.value)} (${percentage}%)</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${width}%; background: ${item.color};"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayRealtime(realtime) {
            document.getElementById('recentOrders').textContent = formatNumber(realtime.recentOrderCount || 0);
            document.getElementById('recentRevenue').textContent = formatAmount(realtime.recentRevenue || 0);
            document.getElementById('redisConnections').textContent = formatNumber(realtime.redisConnections || 0);
            document.getElementById('updateTime').textContent = formatDate(realtime.timestamp);
        }

        function displayTopProducts(topProducts) {
            const list = document.getElementById('topProductsList');
            const emptyState = document.getElementById('topProductsEmpty');
            const loading = document.getElementById('topProductsLoading');

            loading.style.display = 'none';

            if (!topProducts.topProducts || topProducts.topProducts.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            list.innerHTML = topProducts.topProducts.map((product, index) => `
                <div class="product-item">
                    <div class="product-rank">${index + 1}</div>
                    <div class="product-info">
                        <div class="product-name">${product.productName}</div>
                        <div class="product-stats">销量: ${formatNumber(product.salesCount)} 件</div>
                    </div>
                    <div class="product-sales">${formatNumber(product.salesCount)} 件</div>
                </div>
            `).join('');
        }

        function displaySystemHealth(health) {
            const systemHealth = document.getElementById('systemHealth');
            const loading = document.getElementById('healthLoading');

            loading.style.display = 'none';

            const overallStatus = getHealthStatus(health.status);

            systemHealth.innerHTML = `
                <div class="health-item">
                    <span class="health-label">系统状态</span>
                    <span class="health-status ${overallStatus.class}">${overallStatus.text}</span>
                </div>
                <div class="health-item">
                    <span class="health-label">JVM堆内存</span>
                    <span class="health-value">${health.heapUsedMB || 0} MB / ${health.heapMaxMB || 0} MB</span>
                </div>
                <div class="health-item">
                    <span class="health-label">内存使用率</span>
                    <span class="health-value">${health.heapUsagePercent || 0}%</span>
                </div>
                <div class="health-item">
                    <span class="health-label">Redis状态</span>
                    <span class="health-status ${health.redisHealthy ? 'status-healthy' : 'status-error'}">
                        ${health.redisHealthy ? '正常' : '异常'}
                    </span>
                </div>
                <div class="health-item">
                    <span class="health-label">数据库状态</span>
                    <span class="health-status ${health.databaseHealthy ? 'status-healthy' : 'status-error'}">
                        ${health.databaseHealthy ? '正常' : '异常'}
                    </span>
                </div>
            `;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('dashboardContent').style.display = show ? 'none' : 'block';
        }

        loadDashboardData();

        setInterval(loadDashboardData, 60000);
    </script>
</body>
</html>
